name: Sinema Verisini Güncelle

on:
  schedule:
    - cron: "0 3 * * *"  # Her gün 06:00 TRT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Node kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Chromium bağımlılıklarını kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libatk-bridge2.0-0 libatk1.0-0 libcups2 libdrm2 \
            libgbm1 libgtk-3-0 libnspr4 libnss3 libxcomposite1 \
            libxdamage1 libxfixes3 libxkbcommon0 libxrandr2

      - name: Puppeteer kur
        run: npm install puppeteer --no-save

      - name: Sinema verisini çek
        run: node scripts/scrape-cinema.mjs

      - name: Değişiklik varsa commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/cinema.json
          git diff --staged --quiet || git commit -m "chore: sinema verisini güncelle ($(date -u +%Y-%m-%d))"
          git push

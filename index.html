<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Günlüğüm">
<meta name="theme-color" content="#36393e">
<link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/initials/svg?seed=YEK&backgroundColor=FBD100&fontFamily=Georgia&fontSize=40&chars=2">
<title>Günlüğüm</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css?v=3">
<link rel="stylesheet" href="css/home.css?v=5">
<link rel="stylesheet" href="css/films.css?v=3">
<link rel="stylesheet" href="css/books.css?v=3">
<link rel="stylesheet" href="css/goals.css?v=3">
<link rel="stylesheet" href="css/calendar.css?v=4">
<link rel="stylesheet" href="css/clock.css?v=3">
<link rel="stylesheet" href="css/chain.css?v=3">
<link rel="stylesheet" href="css/ai.css?v=3">
<style>html,body{height:100%}#app-wrapper{min-height:100vh}</style>
</head>
<body>

<div id="bg-wallpaper"></div>

<div id="mobile-topbar" style="display:none;position:fixed;top:0;left:0;right:0;z-index:300;height:52px;background:var(--surface);border-bottom:0.5px solid var(--border);align-items:center;padding:0 16px;justify-content:space-between">
  <button onclick="toggleDrawer()" style="background:transparent;border:none;cursor:pointer;color:var(--text);padding:6px;display:flex;flex-direction:column;gap:4px;justify-content:center">
    <span style="display:block;width:20px;height:1.5px;background:currentColor;border-radius:2px"></span>
    <span style="display:block;width:20px;height:1.5px;background:currentColor;border-radius:2px"></span>
    <span style="display:block;width:20px;height:1.5px;background:currentColor;border-radius:2px"></span>
  </button>
  <div id="mobile-page-title" style="font-family:'Playfair Display',serif;font-size:16px;color:var(--accent2)">Giriş</div>
  <div style="width:32px"></div>
</div>

<div id="mobile-overlay" style="display:none;position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.5)" onclick="closeDrawer()"></div>
<div id="mobile-drawer" style="display:none;position:fixed;top:0;left:0;bottom:0;z-index:400;width:240px;background:var(--surface);border-right:0.5px solid var(--border);transform:translateX(-100%);transition:transform .25s;overflow-y:auto">
  <div style="padding:18px 16px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between">
    <div style="font-family:'Playfair Display',serif;font-size:15px;color:var(--accent2)"></div>
    <button onclick="closeDrawer()" style="background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1">×</button>
  </div>
  <nav style="padding:8px 0">
    <div class="m-nav-item" onclick="nav('home',this);closeDrawer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>Giriş</div>
    <div class="m-nav-item" onclick="nav('calendar',this);closeDrawer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Takvim</div>
    <div class="m-nav-item" onclick="nav('goals',this);closeDrawer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Hedefler</div>
    <div class="m-nav-item" onclick="nav('films',this);closeDrawer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>Filmler</div>
    <div class="m-nav-item" onclick="nav('books',this);closeDrawer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Kitaplar</div>
    <div class="m-nav-item" onclick="nav('clock',this);closeDrawer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Kronometre</div>
    <div class="m-nav-item" onclick="nav('chain',this);closeDrawer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Zincir Kırma</div>
    <div class="m-nav-item" onclick="nav('weather',this);closeDrawer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>Hava Durumu</div>
    <div class="m-nav-item" onclick="nav('ai',this);closeDrawer()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Asistan</div>
  </nav>
  <div style="padding:10px 16px;border-top:0.5px solid var(--border)">
    <button onclick="doSignOut()" style="width:100%;padding:9px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Çıkış
    </button>
  </div>
</div>

<style>
#mobile-topbar,#mobile-drawer,#mobile-overlay{display:none}
.m-nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;font-size:14px;color:var(--muted);transition:background .15s}
.m-nav-item:hover,.m-nav-item.active{background:var(--surface2);color:var(--accent)}
.m-nav-item svg{opacity:.6;flex-shrink:0}
.m-nav-item.active svg{opacity:1}
</style>

<div id="app-wrapper" style="display:none;width:100vw;min-height:100vh;overflow-x:hidden">
  <aside class="sidebar collapsed" id="sidebar">
    <div class="sidebar-brand">
      <div><h1 id="sidebar-username"></h1><p id="sb-date"></p></div>
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group">
        <div class="nav-group-label">Genel</div>
        <div class="nav-item active" onclick="nav('home',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg><span class="nav-label-text">Giriş</span></div>
        <div class="nav-item" onclick="nav('calendar',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="nav-label-text">Takvim</span></div>
        <div class="nav-item" onclick="nav('goals',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><span class="nav-label-text">Hedefler</span></div>
        <div class="nav-item" onclick="nav('films',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg><span class="nav-label-text">Filmler</span></div>
        <div class="nav-item" onclick="nav('books',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="nav-label-text">Kitaplar</span></div>
        <div class="nav-item" onclick="nav('clock',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="nav-label-text">Kronometre</span></div>
        <div class="nav-item" onclick="nav('chain',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><span class="nav-label-text">Zincir Kırma</span></div>
        <div class="nav-item" onclick="nav('weather',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg><span class="nav-label-text">Hava Durumu</span></div>
        <div class="nav-item" onclick="nav('ai',this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="nav-label-text">Asistan</span></div>
      </div>
    </nav>
    <div class="sidebar-footer" style="gap:6px">
      <button onclick="doSignOut()" title="Çıkış Yap" style="background:transparent;border:0.5px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;padding:5px 7px;display:flex;align-items:center">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>
  <main class="main expanded" id="main-content">
    <div id="page-container"></div>
  </main>
</div>

<div id="loading-screen" style="display:flex;position:fixed;inset:0;z-index:10000;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:12px">
  <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--accent)">Günlüğüm</div>
  <div style="width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div id="login-screen" style="display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px">
  <div style="font-family:'Playfair Display',serif;font-size:26px;color:var(--accent);text-align:center">Günlüğüm</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Devam etmek için giriş yapın</div>
  <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px">
    <input id="login-email" type="email" placeholder="E-posta" style="padding:11px 14px;border-radius:9px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%">
    <input id="login-password" type="password" placeholder="Şifre" onkeydown="if(event.key==='Enter')emailSignIn()" style="padding:11px 14px;border-radius:9px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%">
    <button onclick="emailSignIn()" style="padding:11px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;width:100%">Giriş Yap</button>
    <button onclick="emailSignUp()" style="padding:11px;border-radius:9px;border:0.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;width:100%">Hesap Oluştur</button>
  </div>
  <div id="login-error" style="font-size:12px;color:#c0392b;display:none;text-align:center"></div>
</div>

<!-- FLOATING AI BUTONU (giriş sonrası gösterilir) -->
<button id="fab-ai" onclick="fabAiToggle()" title="AI Asistan" style="display:none">
  <div class="fab-ai-rings"><div class="fab-ring r1"></div><div class="fab-ring r2"></div></div>
  <svg id="fab-ai-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<!-- FLOATING PANEL -->
<div id="fab-ai-panel" class="fab-panel" style="display:none">
  <div class="fab-panel-header">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="fab-status-dot" id="fab-status-dot"></div>
      <span class="fab-panel-title">Asistan</span>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="fab-icon-btn" onclick="nav('ai',document.querySelector('.nav-item[onclick*=\'ai\']'));fabAiToggle()" title="Tam ekran">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <button class="fab-icon-btn" onclick="fabAiToggle()" title="Kapat">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="fab-messages" id="fab-messages"></div>
  <div class="fab-input-area">
    <div class="fab-input-row">
      <textarea id="fab-input" class="fab-input" placeholder="Bir şey sorun..." rows="1"
        onkeydown="fabAiKeyDown(event)" oninput="fabAiResize(this)"></textarea>
      <button id="fab-mic" class="fab-mic-btn" onclick="fabAiMic()" title="Sesli giriş">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>
      </button>
      <button id="fab-send" class="fab-send-btn" onclick="fabAiSend()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- JS -->
<script src="js/common.js?v=6"></script>
<script src="js/home.js?v=3"></script>
<script src="js/films.js?v=3"></script>
<script src="js/books.js?v=3"></script>
<script src="js/goals.js?v=3"></script>
<script src="js/calendar.js?v=15"></script>
<script src="js/clock.js?v=3"></script>
<script src="js/chain.js?v=5"></script>
<script src="js/weather.js?v=34"></script>
<script src="js/ai.js?v=5"></script>
<script>
// Giriş sonrası fab butonunu göster
const _origAppInit = window._appInit;
window._appInit = function() {
  if (_origAppInit) _origAppInit();
  const fab = document.getElementById('fab-ai');
  if (fab) fab.style.display = 'flex';
};
</script>
</body>
</html>

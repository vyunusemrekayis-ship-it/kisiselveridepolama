<div style="display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:4px;width:fit-content">
      <button class="g-tab active" id="btab-read" onclick="switchBookTab('read',this)">Okuduklarım</button>
      <button class="g-tab" id="btab-readlist" onclick="switchBookTab('readlist',this)">Okuyacaklarım</button>
    </div>

    <!-- Okuduklarım -->
    <div id="bt-read" class="g-tab-content active">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="section-title">Kitaplar</div>
          <div style="background:var(--book-bg);border:0.5px solid var(--border);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--book-l);font-weight:500"><span id="book-counter">0</span> kitap</div>
        </div>
        <button class="add-btn" onclick="toggleForm('bf')">+ Kitap Ekle</button>
      </div>
      <div class="form-panel" id="bf" style="display:none">
        <div class="fg c2"><div><label>Kitap Adı *</label><input id="b-name" placeholder="Örn: Suç ve Ceza"></div><div><label>Yazar <span id="b-author-loading" style="font-size:10px;color:var(--muted);display:none">yükleniyor...</span></label><div style="display:flex;gap:5px"><input id="b-author" placeholder="Otomatik doldur →"><button type="button" onclick="autoFillBook('b-name','b-author','b-pages')" style="padding:0 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0">✦ Doldur</button></div></div></div>
        <div class="fg c2"><div><label>Sayfa Sayısı</label><input type="number" id="b-pages" placeholder="350"></div><div></div></div>
        <div class="fg c2"><div><label>Başlama Tarihi</label><input type="date" id="b-start"></div><div><label>Bitirme Tarihi</label><input type="date" id="b-end"></div></div>
        <div class="fg c1"><label>Notlarım</label><textarea id="b-note" placeholder="Kitap hakkında izlenimlerim..."></textarea></div>
        <div class="form-actions"><button class="btn-cancel" onclick="cancelBookForm()">İptal</button><button class="btn-save" id="bf-save-btn" onclick="addBook()">Kaydet</button></div>
      </div>
      <div class="cards c2" id="book-list"></div>
    </div>

    <!-- Okuyacaklarım -->
    <div id="bt-readlist" class="g-tab-content">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="section-title">Okuyacaklarım</div>
          <div style="background:var(--book-bg);border:0.5px solid var(--border);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--book-l);font-weight:500"><span id="rl-counter">0</span> kitap</div>
        </div>
        <button class="add-btn" onclick="toggleForm('rlf')">+ Kitap Ekle</button>
      </div>
      <div class="form-panel" id="rlf" style="display:none">
        <div class="fg c2"><div><label>Kitap Adı *</label><input id="rl-name" placeholder="Örn: Dune"></div><div><label>Yazar <span id="rl-author-loading" style="font-size:10px;color:var(--muted);display:none">yükleniyor...</span></label><div style="display:flex;gap:5px"><input id="rl-author" placeholder="Otomatik doldur →"><button type="button" onclick="autoFillBook('rl-name','rl-author',null)" style="padding:0 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0">✦ Doldur</button></div></div></div>
        <div class="form-actions"><button class="btn-cancel" onclick="cancelRlForm()">İptal</button><button class="btn-save" id="rlf-save-btn" onclick="addReadlist()">Kaydet</button></div>
      </div>
      <div class="cards c2" id="readlist-list"></div>
    </div>

<div class="section-header">
  <div class="section-title">Takvim</div>
  <div style="display:flex;align-items:center;gap:8px">
    <div style="position:relative">
      <input id="cal-search-input" type="text" placeholder="🔍 Ara..." 
        oninput="calSearch()"
        style="padding:6px 12px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:180px">
      <div id="cal-search-results" style="position:absolute;top:100%;left:0;right:0;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;margin-top:4px;z-index:100;max-height:300px;overflow-y:auto;display:none"></div>
    </div>
  </div>
</div>

<div class="cal-wrap">
  <!-- Sol: Takvim -->
  <div>
    <div class="cal-header">
      <button class="cal-nav" onclick="calMove(-1)">‹</button>
      <div class="cal-month" id="cal-month"></div>
      <button class="cal-nav" onclick="calMove(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-wds">
        <div class="cal-wd">Pzt</div><div class="cal-wd">Sal</div>
        <div class="cal-wd">Çar</div><div class="cal-wd">Per</div>
        <div class="cal-wd">Cum</div><div class="cal-wd">Cmt</div>
        <div class="cal-wd">Paz</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    </div>
<div style="display:flex;gap:20px;flex-wrap:wrap;margin:14px 0 4px;padding:10px 14px;border-radius:10px;background:var(--surface2);border:0.5px solid var(--border);align-items:center">
  <span style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text)"><span style="color:#e53935;font-size:16px">●</span> Resmi Tatil</span>
  <span style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text)"><span style="color:#8e44ad;font-size:16px">●</span> Dini Bayram</span>
  <span style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text)"><span style="color:#1565c0;font-size:16px">●</span> Uluslararası</span>
  <span style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text)"><span style="color:var(--accent);font-size:16px">●</span> Not</span>
  <button onclick="openCustomDayModal()" style="margin-left:auto;padding:4px 12px;border-radius:7px;border:0.5px solid var(--border);background:var(--surface3);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">+ Özel Gün</button>
</div>
  </div>

  <!-- Sağ: Bu aydaki özel günler -->
  <div>
</div>



<!-- Seçilen gün paneli -->
<div id="cal-day-panel" style="display:none;margin-top:20px;border-top:0.5px solid var(--border);padding-top:20px">
  <div class="cal-side-title" id="cal-sel-lbl"></div>
  <div class="cal-items" id="cal-items" style="margin-bottom:16px"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <!-- Yapılacaklar -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div class="note-label">Yapılacaklar</div>
        <span id="todo-counter" style="font-size:11px;color:var(--muted)"></span>
      </div>
      <div id="todo-list" style="display:grid;gap:5px;margin-bottom:8px"></div>
      <div style="display:flex;gap:6px">
        <input id="todo-input" placeholder="Görev ekle..." onkeydown="if(event.key==='Enter')todoEnter()"
          style="flex:1;padding:7px 10px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none">
        <button id="todo-add-btn" onclick="addTodo()"
          style="padding:7px 14px;border-radius:8px;border:none;background:var(--accent);color:#1a1a00;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer">Ekle</button>
      </div>
    </div>

    <!-- Not ekle -->
    <div>
      <div class="note-label" id="cal-note-lbl" style="margin-bottom:8px">Not ekle</div>
      <textarea class="note-ta" id="note-ta" placeholder="Not yaz..." style="min-height:70px"></textarea>
      <div style="display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap">
        <div style="display:flex;gap:4px" id="cal-color-picker">
          <div onclick="setCalNoteColor('#3a7bd5')" style="width:16px;height:16px;border-radius:50%;background:#3a7bd5;cursor:pointer;border:2px solid transparent" data-color="#3a7bd5"></div>
          <div onclick="setCalNoteColor('#237F52')" style="width:16px;height:16px;border-radius:50%;background:#237F52;cursor:pointer;border:2px solid transparent" data-color="#237F52"></div>
          <div onclick="setCalNoteColor('#c0392b')" style="width:16px;height:16px;border-radius:50%;background:#c0392b;cursor:pointer;border:2px solid transparent" data-color="#c0392b"></div>
          <div onclick="setCalNoteColor('#FBD100')" style="width:16px;height:16px;border-radius:50%;background:#FBD100;cursor:pointer;border:2px solid transparent" data-color="#FBD100"></div>
          <div onclick="setCalNoteColor('#7b5ea7')" style="width:16px;height:16px;border-radius:50%;background:#7b5ea7;cursor:pointer;border:2px solid transparent" data-color="#7b5ea7"></div>
          <div onclick="setCalNoteColor('#e8a888')" style="width:16px;height:16px;border-radius:50%;background:#e8a888;cursor:pointer;border:2px solid transparent" data-color="#e8a888"></div>
          <input type="color" id="cal-note-custom-color" onchange="setCalNoteColor(this.value)" title="Özel renk"
            style="width:16px;height:16px;border:none;padding:0;border-radius:50%;cursor:pointer;background:transparent">
        </div>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="note-clear" onclick="cancelCalNote()">İptal</button>
          <button class="note-save" onclick="saveCalNote()">Kaydet</button>
        </div>
      </div>
      <div class="note-saved" id="note-saved">✓ Kaydedildi</div>
    </div>
  </div>

  <!-- Medya -->
  <div style="margin-top:16px;border-top:0.5px solid var(--border);padding-top:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="note-label">Fotoğraf &amp; Video</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button id="media-edit-btn" onclick="toggleMediaEdit()" style="padding:5px 12px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">Düzenle</button>
        <label style="padding:5px 12px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">
          + Ekle
          <input type="file" accept="image/*,video/*" multiple onchange="addCalMedia(event)" style="display:none">
        </label>
      </div>
    </div>
    <div id="cal-media-list" style="display:flex;flex-wrap:wrap;gap:8px"></div>
  </div>
</div>

<!-- ── KİŞİSEL ÖZEL GÜN MODAL ─────────────────────────────────── -->
<div id="custom-day-modal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.65);align-items:center;justify-content:center" onclick="if(event.target===this)closeCustomDayModal()">
  <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:22px;width:360px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.5)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--accent2)">Kişisel Özel Günler</div>
      <button onclick="closeCustomDayModal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:0 2px">×</button>
    </div>

    <!-- Liste -->
    <div id="custom-day-list" style="display:grid;gap:5px;margin-bottom:14px;max-height:220px;overflow-y:auto"></div>

    <!-- Yeni ekle formu -->
    <div style="border-top:0.5px solid var(--border);padding-top:14px;display:grid;gap:8px">
      <input id="cd-name" placeholder="Gün adı (ör: Doğum Günüm)" autocomplete="off"
        style="padding:8px 11px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;box-sizing:border-box"
        onkeydown="if(event.key==='Enter')saveCustomDay()">
      <div style="display:flex;gap:8px;align-items:center">
        <input id="cd-date" type="date"
          style="flex:1;padding:8px 11px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;color-scheme:dark">
        <input id="cd-color" type="color" value="#f59e0b" title="Renk seç"
          style="width:36px;height:36px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;padding:3px;flex-shrink:0">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0">
          <input id="cd-repeat" type="checkbox" style="cursor:pointer"> Her yıl
        </label>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="closeCustomDayModal()"
          style="flex:1;padding:8px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer">Kapat</button>
        <button onclick="saveCustomDay()"
          style="flex:1;padding:8px;border-radius:8px;border:0.5px solid var(--accent);background:transparent;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;font-weight:500">Ekle</button>
      </div>
    </div>
  </div>
</div>

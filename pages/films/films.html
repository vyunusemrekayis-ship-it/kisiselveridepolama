<div style="display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:4px;width:fit-content">
      <button class="g-tab active" id="ftab-watched" onclick="switchFilmTab('watched',this)">İzlediklerim</button>
      <button class="g-tab" id="ftab-watchlist" onclick="switchFilmTab('watchlist',this)">İzleyeceklerim</button>
    </div>

    <!-- İzlediklerim -->
    <div id="ft-watched" class="g-tab-content active">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="section-title">Filmler</div>
          <div style="background:var(--film-bg);border:0.5px solid var(--border);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--film-l);font-weight:500"><span id="film-counter">0</span> film</div>
        </div>
        <button class="add-btn" onclick="toggleForm('ff')">+ Film Ekle</button>
      </div>
      <div class="form-panel" id="ff" style="display:none">
        <div class="fg c2"><div><label>Film Adı *</label><input id="f-name" placeholder="Örn: Inception"></div><div><label>Yönetmen <span id="f-dir-loading" style="font-size:10px;color:var(--muted);display:none">yükleniyor...</span></label><div style="display:flex;gap:5px"><input id="f-dir" placeholder="Otomatik doldur →"><button type="button" onclick="autoFillFilm('f-name','f-dir')" style="padding:0 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0">✦ Doldur</button></div></div></div>
        <div class="fg c2"><div><label>İzlenme Tarihi</label><input type="date" id="f-date"></div><div></div></div>
        <div class="fg c1"><label>Notlarım</label><textarea id="f-note" placeholder="Film hakkında düşüncelerim..."></textarea></div>
        <div class="form-actions"><button class="btn-cancel" onclick="cancelFilmForm()">İptal</button><button class="btn-save" id="ff-save-btn" onclick="addFilm()">Kaydet</button></div>
      </div>
      <div class="cards c2" id="film-list"></div>
    </div>

    <!-- İzleyeceklerim -->
    <div id="ft-watchlist" class="g-tab-content">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="section-title">İzleyeceklerim</div>
          <div style="background:var(--film-bg);border:0.5px solid var(--border);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--film-l);font-weight:500"><span id="wl-counter">0</span> film</div>
        </div>
        <button class="add-btn" onclick="toggleForm('wlf')">+ Film Ekle</button>
      </div>
      <div class="form-panel" id="wlf" style="display:none">
        <div class="fg c2"><div><label>Film Adı *</label><input id="wl-name" placeholder="Örn: Oppenheimer"></div><div><label>Yönetmen <span id="wl-dir-loading" style="font-size:10px;color:var(--muted);display:none">yükleniyor...</span></label><div style="display:flex;gap:5px"><input id="wl-dir" placeholder="Otomatik doldur →"><button type="button" onclick="autoFillFilm('wl-name','wl-dir')" style="padding:0 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0">✦ Doldur</button></div></div></div>
        <div class="form-actions"><button class="btn-cancel" onclick="cancelWlForm()">İptal</button><button class="btn-save" id="wlf-save-btn" onclick="addWatchlist()">Kaydet</button></div>
      </div>
      <div class="cards c2" id="watchlist-list"></div>
    </div>

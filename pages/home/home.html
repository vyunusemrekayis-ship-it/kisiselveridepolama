<div class="home-wrap" id="home-bg">
      <div class="home-overlay"></div>

      <!-- SOL ÜST: Bugünün Görevleri -->
      <div class="hw-widget hw-tl" id="hw-todos" onclick="navWidget('calendar')" style="cursor:pointer">
        <div class="hw-title" onclick="hwNavTo('calendar')" style="cursor:pointer">Bugünün Görevleri ›</div>
        <div class="hw-body" id="hw-todos-body"></div>
      </div>

      <!-- SAĞ ÜST: Hedefler -->
      <div class="hw-widget hw-tr" id="hw-goals">
        <div class="hw-title" style="display:flex;justify-content:space-between;align-items:center">
          <span onclick="navWidget('goals')" style="cursor:pointer">Hedefler</span>
          <div style="display:flex;gap:3px">
            <button onclick="event.stopPropagation();hwGoalTab('weekly')" id="hw-gt-weekly" style="background:var(--accent);color:#000;border:none;border-radius:4px;padding:1px 5px;font-size:9px;cursor:pointer">H</button>
            <button onclick="event.stopPropagation();hwGoalTab('monthly')" id="hw-gt-monthly" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:4px;padding:1px 5px;font-size:9px;cursor:pointer">A</button>
            <button onclick="event.stopPropagation();hwGoalTab('yearly')" id="hw-gt-yearly" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:4px;padding:1px 5px;font-size:9px;cursor:pointer">Y</button>
          </div>
        </div>
        <div class="hw-body" id="hw-goals-body"></div>
      </div>

      <!-- ORTA: Kronometre -->
      <div class="hw-center">
        <div class="hw-sw-time" id="hw-sw-display">00:00</div>
        <div class="hw-sw-btns">
          <button class="hw-sw-btn" id="hw-sw-btn" onclick="hwSwToggle()">▶</button>
          <button class="hw-sw-btn hw-sw-reset" onclick="hwSwReset()">↺</button>
        </div>
      </div>

      <!-- SOL ALT: Zincir Kırma -->
      <div class="hw-widget hw-bl" id="hw-chains" onclick="navWidget('chain')" style="cursor:pointer">
        <div class="hw-title" onclick="hwNavTo('chain')" style="cursor:pointer">Zincir Kırma ›</div>
        <div class="hw-body" id="hw-chains-body"></div>
      </div>

      <!-- SAĞ ALT: Takvim -->
      <div class="hw-widget hw-br" id="hw-cal" onclick="navWidget('calendar')" style="cursor:pointer">
        <div class="hw-title" onclick="navWidget('calendar')" style="cursor:pointer">Takvim</div>
        <div class="hw-body" id="hw-cal-body"></div>
      </div>

      <div class="home-credit" id="home-credit"></div>
    </div>

<div class="section-header">
  <div class="section-title">Hava Durumu</div>
  <button class="add-btn" onclick="refreshWeather()" id="weather-refresh-btn">↻ Güncelle</button>
</div>

<!-- Konum Arama -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
  <div style="display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 14px;flex:1;min-width:200px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <input id="weather-city-input" placeholder="Şehir ara..." 
      style="border:none;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;flex:1"
      onkeydown="if(event.key==='Enter')searchWeatherCity()">
  </div>
  <button onclick="getWeatherByGPS()" style="padding:8px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:6px">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
    Konumumu Kullan
  </button>
  <button onclick="searchWeatherCity()" style="padding:8px 18px;border-radius:12px;border:none;background:var(--accent);color:#1a1a00;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Ara</button>
</div>

<div id="weather-error" style="display:none;padding:12px 16px;background:rgba(192,57,43,.1);border-radius:12px;color:#c0392b;font-size:13px;margin-bottom:12px;border:1px solid rgba(192,57,43,.2)"></div>
<div id="weather-loading" style="display:none;text-align:center;padding:60px;color:var(--muted)">
  <div class="weather-spinner"></div>
  <div style="margin-top:14px;font-size:13px">Hava durumu yükleniyor...</div>
</div>

<div id="weather-welcome" style="text-align:center;padding:60px 20px;color:var(--muted)">
  <div style="font-size:72px;margin-bottom:16px">🌤️</div>
  <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Hava Durumunu Görüntüle</div>
  <div style="font-size:13px">Şehir adı gir veya konumunu kullan</div>
</div>

<div id="weather-main-card" style="display:none">

  <!-- HERO KARTI -->
  <div id="weather-hero" style="border-radius:20px;padding:24px;margin-bottom:14px;position:relative;overflow:hidden">
    <div id="weather-bg-anim" style="position:absolute;inset:0;pointer-events:none"></div>
    
    <!-- Üst satır: ikon + sıcaklık + konum + güncelleme -->
    <div style="position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div style="display:flex;align-items:center;gap:16px">
        <div id="weather-icon-big" style="font-size:72px;line-height:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.2))"></div>
        <div>
          <div id="weather-temp-big" style="font-size:56px;font-weight:800;line-height:1;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.2)"></div>
          <div id="weather-feels-lbl" style="font-size:13px;color:rgba(255,255,255,.8);margin-top:4px"></div>
          <div id="weather-condition-big" style="font-size:15px;font-weight:600;color:#fff;margin-top:6px"></div>
        </div>
      </div>
      <div style="text-align:right">
        <div id="weather-location-big" style="font-size:14px;font-weight:600;color:#fff;display:flex;align-items:center;gap:5px;justify-content:flex-end">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span></span>
        </div>
        <div id="weather-updated" style="font-size:11px;color:rgba(255,255,255,.55);margin-top:5px"></div>
      </div>
    </div>

    <!-- İstatistik kartları -->
    <div style="position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">
      <div class="w-stat" id="hs-humidity"></div>
      <div class="w-stat" id="hs-wind"></div>
      <div class="w-stat" id="hs-uv"></div>
      <div class="w-stat" id="hs-precip"></div>
    </div>

    <!-- Gündoğumu / Günbatımı / Basınç / Görünürlük -->
    <div style="position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      <div class="w-sun-card" id="ws-sunrise" style="background:linear-gradient(135deg,rgba(255,140,0,.35),rgba(255,200,50,.2))">
        <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">
          <div style="position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:60px;height:60px;background:radial-gradient(circle,rgba(255,220,50,.4) 0%,transparent 70%);animation:sunRay 2.5s ease-in-out infinite"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(255,180,0,.5),transparent)"></div>
        </div>
        <div class="w-sun-icon" style="margin-bottom:6px"><svg width="52" height="40" viewBox="0 0 52 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 2px 6px rgba(255,180,0,.5))">
  <!-- Güneş ışınları -->
  <g style="animation:sunRay 2.5s ease-in-out infinite;transform-origin:26px 26px">
    <line x1="26" y1="4" x2="26" y2="10" stroke="rgba(255,220,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="42" y1="10" x2="37.7" y2="14.2" stroke="rgba(255,220,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="14.3" y2="14.2" stroke="rgba(255,220,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="26" x2="42" y2="26" stroke="rgba(255,220,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="26" x2="10" y2="26" stroke="rgba(255,220,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Güneş -->
  <circle cx="26" cy="26" r="10" fill="url(#sunGrad)" style="animation:sunRay 2.5s ease-in-out infinite;transform-origin:26px 26px"/>
  <!-- Ufuk çizgisi -->
  <line x1="4" y1="34" x2="48" y2="34" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Yükselen çizgiler (ışık huzmeleri) -->
  <line x1="26" y1="34" x2="26" y2="38" stroke="rgba(255,200,50,.6)" stroke-width="1" stroke-linecap="round" stroke-dasharray="1 2"/>
  <line x1="19" y1="34" x2="16" y2="38" stroke="rgba(255,200,50,.4)" stroke-width="1" stroke-linecap="round" stroke-dasharray="1 2"/>
  <line x1="33" y1="34" x2="36" y2="38" stroke="rgba(255,200,50,.4)" stroke-width="1" stroke-linecap="round" stroke-dasharray="1 2"/>
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7a0"/>
      <stop offset="50%" stop-color="#ffd200"/>
      <stop offset="100%" stop-color="#f7971e"/>
    </radialGradient>
  </defs>
</svg></div>
        <div class="w-sun-val" id="hs-sunrise"></div>
        <div class="w-sun-lbl">Gündoğumu</div>
      </div>
      <div class="w-sun-card" id="ws-sunset" style="background:linear-gradient(135deg,rgba(255,80,0,.35),rgba(180,50,100,.25))">
        <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">
          <div style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:radial-gradient(circle,rgba(255,100,50,.4) 0%,transparent 70%);animation:sunRay 3s ease-in-out .5s infinite"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(255,80,0,.5),transparent)"></div>
        </div>
        <div class="w-sun-icon" style="margin-bottom:6px"><svg width="52" height="40" viewBox="0 0 52 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 2px 6px rgba(255,80,0,.5))">
  <!-- Güneş ışınları azalan -->
  <g style="animation:sunRay 3s ease-in-out .5s infinite;transform-origin:26px 30px;opacity:.7">
    <line x1="26" y1="10" x2="26" y2="16" stroke="rgba(255,140,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="42" y1="14" x2="37.7" y2="18" stroke="rgba(255,140,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="14" x2="14.3" y2="18" stroke="rgba(255,140,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="47" y1="30" x2="41" y2="30" stroke="rgba(255,140,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="30" x2="11" y2="30" stroke="rgba(255,140,50,.9)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Güneş yarısı -->
  <path d="M16 34 A10 10 0 0 1 36 34" fill="url(#sunsetGrad)"/>
  <!-- Ufuk çizgisi -->
  <line x1="4" y1="34" x2="48" y2="34" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Gökyüzü renk katmanları -->
  <rect x="4" y="34" width="44" height="4" rx="1" fill="url(#skyGrad)" opacity=".4"/>
  <defs>
    <radialGradient id="sunsetGrad" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#fff0a0"/>
      <stop offset="40%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </radialGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(255,100,50,.6)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg></div>
        <div class="w-sun-val" id="hs-sunset"></div>
        <div class="w-sun-lbl">Günbatımı</div>
      </div>
      <div class="w-sun-card">
        <div class="w-sun-icon">🌡️</div>
        <div class="w-sun-val" id="hs-pressure"></div>
        <div class="w-sun-lbl">Basınç</div>
      </div>
      <div class="w-sun-card">
        <div class="w-sun-icon">👁️</div>
        <div class="w-sun-val" id="hs-visibility"></div>
        <div class="w-sun-lbl">Görünürlük</div>
      </div>
    </div>
  </div>

  <!-- Saatlik -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px">
    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">⏱ Saatlik Tahmin</div>
    <div id="weather-hourly" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px"></div>
  </div>

  <!-- 7 Günlük -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px">
    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">📅 7 Günlük Tahmin</div>
    <div id="weather-daily"></div>
  </div>

</div>

<style>
.weather-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:wspin .8s linear infinite;margin:0 auto}
@keyframes wspin{to{transform:rotate(360deg)}}

.w-stat{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.2);
  border-radius:14px;
  padding:12px 14px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.w-stat .ws-icon{font-size:18px;margin-bottom:4px}
.w-stat .ws-val{font-size:16px;font-weight:700;color:#fff;line-height:1.2}
.w-stat .ws-lbl{font-size:11px;color:rgba(255,255,255,.95);margin-top:3px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.3)}

.w-sun-card{
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.2);
  border-radius:14px;
  padding:14px 12px;
  text-align:center;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  position:relative;
  overflow:hidden;
}
.w-sun-icon{font-size:28px;margin-bottom:6px;position:relative;z-index:1}
.w-sun-val{font-size:18px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.3);position:relative;z-index:1}
.w-sun-lbl{font-size:11px;color:rgba(255,255,255,.9);margin-top:4px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.3);position:relative;z-index:1}

.hourly-item{flex-shrink:0;text-align:center;padding:10px 8px;border-radius:12px;min-width:54px;transition:all .15s;cursor:default;border:1px solid transparent}
.hourly-item.now{background:var(--accent);border-color:var(--accent)}
.hourly-item .h-time{font-size:10px;color:var(--muted);margin-bottom:4px}
.hourly-item.now .h-time{color:rgba(0,0,0,.6)}
.hourly-item .h-icon{font-size:22px;margin-bottom:3px}
.hourly-item .h-temp{font-size:13px;font-weight:700;color:var(--text)}
.hourly-item.now .h-temp{color:#1a1a00}
.hourly-item .h-bar{width:4px;border-radius:2px;background:var(--accent);opacity:.5;margin:3px auto;transition:height .4s}
.hourly-item.now .h-bar{background:rgba(0,0,0,.3)}
.hourly-item .h-rain{font-size:10px;color:#4facfe;margin-top:2px}
.hourly-item.now .h-rain{color:rgba(0,0,0,.5)}

.daily-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:14px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;margin-bottom:4px}
.daily-row:hover{background:var(--surface2)}
.daily-row.sel{background:linear-gradient(135deg,rgba(58,123,213,.12),rgba(58,123,213,.04));border-color:var(--accent);box-shadow:0 2px 16px rgba(58,123,213,.12)}
.daily-row.today-row{background:var(--surface2)}

.day-detail{
  margin:2px 0 10px;
  padding:16px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:14px;
  animation:fadeInUp .25s ease both;
}

@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes sunRay{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes cloudDrift{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
@keyframes rainFall{0%{transform:translateY(-12px);opacity:0}70%{opacity:.8}100%{transform:translateY(24px);opacity:0}}
@keyframes snowFall{0%{transform:translateY(-12px) rotate(0);opacity:0}70%{opacity:.7}100%{transform:translateY(24px) rotate(180deg);opacity:0}}
@keyframes lightning{0%,88%,100%{opacity:0}90%,96%{opacity:1}}
</style>

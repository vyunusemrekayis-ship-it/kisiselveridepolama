<style>
/* Apple Weather stili */
.aw-wrap{display:flex;gap:0;height:calc(100vh - 120px);min-height:600px;border-radius:18px;overflow:hidden;background:#1c1c1e}

/* Sol: Şehir listesi */
.aw-sidebar{width:280px;flex-shrink:0;background:rgba(28,28,30,.95);backdrop-filter:blur(20px);border-right:0.5px solid rgba(255,255,255,.08);display:flex;flex-direction:column;overflow:hidden}
.aw-search{padding:12px 16px;border-bottom:0.5px solid rgba(255,255,255,.06)}
.aw-search input{width:100%;padding:8px 12px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;box-sizing:border-box}
.aw-search input::placeholder{color:rgba(255,255,255,.4)}
.aw-cities{flex:1;overflow-y:auto;padding:8px}
.aw-city-card{padding:12px 14px;border-radius:14px;cursor:pointer;transition:background .15s;margin-bottom:6px;position:relative;overflow:hidden;background:rgba(255,255,255,.05)}
.aw-city-card:hover{background:rgba(255,255,255,.09)}
.aw-city-card.active{background:rgba(255,255,255,.12)}
.aw-city-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:2px}
.aw-city-sub{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px}
.aw-city-temp{font-size:26px;font-weight:300;color:#fff;position:absolute;top:12px;right:14px}
.aw-city-range{font-size:11px;color:rgba(255,255,255,.5)}
.aw-add-city{padding:14px 16px;border-top:0.5px solid rgba(255,255,255,.06)}
.aw-add-btn{width:100%;padding:9px;border-radius:10px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.aw-add-btn:hover{background:rgba(255,255,255,.12)}

/* Sağ: Ana içerik */
.aw-main{flex:1;overflow-y:auto;position:relative;background:#1c1c1e}
.aw-bg{position:absolute;inset:0;z-index:0;transition:background 1s ease}
.aw-content{position:relative;z-index:1;padding:28px 28px 40px}

/* Hero */
.aw-hero{text-align:center;padding:20px 0 28px}
.aw-hero-loc{font-size:11px;font-weight:600;letter-spacing:1.5px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:4px}
.aw-hero-city{font-size:36px;font-weight:600;color:#fff;margin-bottom:2px}
.aw-hero-temp{font-size:80px;font-weight:200;color:#fff;line-height:1;margin-bottom:4px}
.aw-hero-cond{font-size:18px;color:rgba(255,255,255,.8);margin-bottom:4px}
.aw-hero-range{font-size:15px;color:rgba(255,255,255,.6)}

/* Özet banner */
.aw-summary{background:rgba(255,255,255,.07);backdrop-filter:blur(10px);border-radius:14px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:rgba(255,255,255,.8);border:0.5px solid rgba(255,255,255,.08)}

/* Saatlik */
.aw-hourly-wrap{background:rgba(255,255,255,.07);backdrop-filter:blur(10px);border-radius:18px;padding:14px 16px;margin-bottom:14px;border:0.5px solid rgba(255,255,255,.08)}
.aw-section-title{font-size:10px;font-weight:700;letter-spacing:1.2px;color:rgba(255,255,255,.45);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.aw-hourly-scroll{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.aw-hourly-scroll::-webkit-scrollbar{display:none}
.aw-h-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 10px;border-radius:12px;min-width:52px;gap:3px}
.aw-h-item.now{background:rgba(255,255,255,.15)}
.aw-h-time{font-size:11px;color:rgba(255,255,255,.55);font-weight:500}
.aw-h-item.now .aw-h-time{color:rgba(255,255,255,.8)}
.aw-h-icon{height:28px;display:flex;align-items:center;justify-content:center}
.aw-h-rain{font-size:10px;color:#5ac8fa;font-weight:500}
.aw-h-temp{font-size:13px;font-weight:600;color:#fff}
/* Özel zaman damgaları (gündoğumu/batımı) */
.aw-h-item.special{background:rgba(255,180,50,.12)}
.aw-h-item.special .aw-h-time{color:rgba(255,200,80,.8)}
.aw-h-item.special .aw-h-temp{color:rgba(255,200,80,.9);font-size:11px}

/* 10 Günlük */
.aw-daily-wrap{background:rgba(255,255,255,.07);backdrop-filter:blur(10px);border-radius:18px;padding:14px 16px;margin-bottom:14px;border:0.5px solid rgba(255,255,255,.08)}
.aw-d-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid rgba(255,255,255,.06)}
.aw-d-row:last-child{border-bottom:none}
.aw-d-day{width:36px;font-size:13px;font-weight:500;color:#fff}
.aw-d-icon{width:28px;display:flex;align-items:center;justify-content:center}
.aw-d-rain{font-size:11px;color:#5ac8fa;font-weight:600;width:36px}
.aw-d-low{font-size:13px;color:rgba(255,255,255,.5);width:26px;text-align:right}
.aw-d-bar{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.1);position:relative;overflow:hidden;margin:0 6px}
.aw-d-bar-fill{position:absolute;top:0;height:100%;border-radius:3px;background:linear-gradient(to right,#5ac8fa,#ffd60a)}
.aw-d-high{font-size:13px;font-weight:600;color:#fff;width:26px}

/* Detay kartları grid */
.aw-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.aw-detail-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.aw-d-card{background:rgba(255,255,255,.07);backdrop-filter:blur(10px);border-radius:18px;padding:16px;border:0.5px solid rgba(255,255,255,.08);min-height:120px}
.aw-d-card-title{font-size:10px;font-weight:700;letter-spacing:1.2px;color:rgba(255,255,255,.45);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.aw-d-card-val{font-size:32px;font-weight:300;color:#fff;line-height:1.1;margin-bottom:4px}
.aw-d-card-sub{font-size:12px;color:rgba(255,255,255,.5);line-height:1.4}

/* Rüzgar kadranı */
.aw-wind-dial{position:relative;width:80px;height:80px;margin:4px auto}
.aw-wind-dial svg{width:100%;height:100%}

/* UV bar */
.aw-uv-bar{height:6px;border-radius:3px;background:linear-gradient(to right,#30d158,#ffd60a,#ff6b35,#ff3b30,#9b59b6);margin:8px 0 4px;position:relative;overflow:visible}
.aw-uv-marker{position:absolute;top:-3px;width:4px;height:12px;background:#fff;border-radius:2px;transform:translateX(-50%);transition:left .5s ease;box-shadow:0 0 4px rgba(0,0,0,.5)}

/* Gündoğumu ark */
.aw-sun-arc{margin:6px 0}

/* Yükleme */
.aw-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;color:rgba(255,255,255,.5)}
.aw-spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.7);border-radius:50%;animation:wspin .8s linear infinite;margin-bottom:12px}

/* Hoşgeldin */
.aw-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;color:rgba(255,255,255,.5);text-align:center}

@keyframes wspin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.aw-fade{animation:fadeIn .4s ease}
</style>

<div class="aw-wrap">
  <!-- Sol: Şehir Listesi -->
  <div class="aw-sidebar">
    <div class="aw-search">
      <input id="aw-search-input" placeholder="🔍 Şehir ara..." 
        onkeydown="if(event.key==='Enter')awAddCity()"
        oninput="awSearchSuggest(this.value)">
      <div id="aw-suggest" style="margin-top:6px;display:none"></div>
    </div>
    <div class="aw-cities" id="aw-city-list"></div>
    <div class="aw-add-city">
      <button class="aw-add-btn" onclick="document.getElementById('aw-search-input').focus()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Şehir Ekle
      </button>
    </div>
  </div>

  <!-- Sağ: Ana Hava İçeriği -->
  <div class="aw-main" id="aw-main">
    <div class="aw-bg" id="aw-bg"></div>
    <div class="aw-content" id="aw-content">
      <div class="aw-welcome" id="aw-welcome">
        <div style="font-size:48px;margin-bottom:16px">🌤️</div>
        <div style="font-size:16px;font-weight:500;color:rgba(255,255,255,.8);margin-bottom:8px">Şehir Ekle</div>
        <div style="font-size:13px">Soldaki aramadan şehir ekle veya konumunu kullan</div>
        <button onclick="awUseGPS()" style="margin-top:16px;padding:10px 20px;border-radius:12px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif">📍 Konumumu Kullan</button>
      </div>
      <div id="aw-weather-content" style="display:none"></div>
      <div class="aw-loading" id="aw-loading" style="display:none">
        <div class="aw-spinner"></div>
        <div style="font-size:13px">Yükleniyor...</div>
      </div>
    </div>
  </div>
</div>

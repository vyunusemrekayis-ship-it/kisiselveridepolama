<div class="section-header">
  <div class="section-title">Hava Durumu</div>
  <button class="add-btn" onclick="refreshWeather()" id="weather-refresh-btn">↻ Güncelle</button>
</div>

<!-- Konum -->
<div id="weather-location-bar" style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
  <div style="display:flex;align-items:center;gap:6px;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:7px 12px;flex:1;min-width:200px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <input id="weather-city-input" placeholder="Şehir ara... (örn: Samsun)" 
      style="border:none;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;flex:1"
      onkeydown="if(event.key==='Enter')searchWeatherCity()">
  </div>
  <button onclick="getWeatherByGPS()" style="padding:7px 14px;border-radius:10px;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap">
    📍 Konumumu Kullan
  </button>
  <button onclick="searchWeatherCity()" style="padding:7px 14px;border-radius:10px;border:none;background:var(--accent);color:#1a1a00;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif">Ara</button>
</div>

<div id="weather-error" style="display:none;padding:12px;background:rgba(192,57,43,.1);border-radius:10px;color:#c0392b;font-size:13px;margin-bottom:12px"></div>

<!-- Ana kart -->
<div id="weather-main-card" style="display:none">

  <!-- Üst: Anlık Durum -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
    
    <!-- Sol: Sıcaklık + Koşul -->
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px">
      <div id="weather-icon" style="font-size:56px;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.15))"></div>
      <div>
        <div id="weather-temp" style="font-size:42px;font-weight:700;line-height:1;color:var(--text)"></div>
        <div id="weather-feels" style="font-size:12px;color:var(--muted);margin-top:3px"></div>
        <div id="weather-condition" style="font-size:14px;color:var(--text);margin-top:6px;font-weight:500"></div>
        <div id="weather-location-name" style="font-size:11px;color:var(--muted);margin-top:2px"></div>
      </div>
    </div>

    <!-- Sağ: Detaylar -->
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="weather-detail-item">
        <div class="weather-detail-icon">💧</div>
        <div class="weather-detail-val" id="wd-humidity"></div>
        <div class="weather-detail-lbl">Nem</div>
      </div>
      <div class="weather-detail-item">
        <div class="weather-detail-icon">💨</div>
        <div class="weather-detail-val" id="wd-wind"></div>
        <div class="weather-detail-lbl">Rüzgar</div>
      </div>
      <div class="weather-detail-item">
        <div class="weather-detail-icon">🌡️</div>
        <div class="weather-detail-val" id="wd-pressure"></div>
        <div class="weather-detail-lbl">Basınç</div>
      </div>
      <div class="weather-detail-item">
        <div class="weather-detail-icon">👁️</div>
        <div class="weather-detail-val" id="wd-visibility"></div>
        <div class="weather-detail-lbl">Görünürlük</div>
      </div>
      <div class="weather-detail-item">
        <div class="weather-detail-icon">☀️</div>
        <div class="weather-detail-val" id="wd-uv"></div>
        <div class="weather-detail-lbl">UV İndeksi</div>
      </div>
      <div class="weather-detail-item">
        <div class="weather-detail-icon">🌧️</div>
        <div class="weather-detail-val" id="wd-precip"></div>
        <div class="weather-detail-lbl">Yağış</div>
      </div>
    </div>
  </div>

  <!-- Gündoğumu/Günbatımı -->
  <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:14px 20px;margin-bottom:12px;display:flex;gap:24px;align-items:center;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">🌅</span>
      <div><div style="font-size:11px;color:var(--muted)">Gündoğumu</div><div id="wd-sunrise" style="font-size:14px;font-weight:500;color:var(--text)"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">🌇</span>
      <div><div style="font-size:11px;color:var(--muted)">Günbatımı</div><div id="wd-sunset" style="font-size:14px;font-weight:500;color:var(--text)"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">🌬️</span>
      <div><div style="font-size:11px;color:var(--muted)">Rüzgar Yönü</div><div id="wd-winddir" style="font-size:14px;font-weight:500;color:var(--text)"></div></div>
    </div>
    <div style="margin-left:auto;font-size:11px;color:var(--muted)" id="weather-updated"></div>
  </div>

  <!-- Saatlik Tahmin -->
  <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px">
    <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px">Saatlik Tahmin</div>
    <div id="weather-hourly" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px"></div>
  </div>

  <!-- 7 Günlük Tahmin -->
  <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:16px">
    <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px">7 Günlük Tahmin</div>
    <div id="weather-daily" style="display:grid;gap:6px"></div>
  </div>

</div>

<!-- Yükleniyor -->
<div id="weather-loading" style="display:none;text-align:center;padding:40px;color:var(--muted)">
  <div style="font-size:32px;margin-bottom:10px">⛅</div>
  <div>Hava durumu yükleniyor...</div>
</div>

<!-- Hoşgeldin -->
<div id="weather-welcome" style="text-align:center;padding:40px;color:var(--muted)">
  <div style="font-size:48px;margin-bottom:12px">🌤️</div>
  <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px">Hava Durumunu Görüntüle</div>
  <div style="font-size:13px">Şehir adı gir veya konumunu kullan</div>
</div>

<div class="section-header">
      <div class="section-title">Zincir Kırma</div>
      <button class="add-btn" onclick="toggleForm('chf')">+ Zincir Ekle</button>
    </div>
    <div class="form-panel" id="chf" style="display:none">
      <div class="fg c2">
        <div><label>Zincir Adı *</label><input id="ch-name" placeholder="Örn: Ders çalış, Spor yap..."></div>
        <div><label>Zincir Sayısı (gün) *</label><input type="number" id="ch-count" min="1" max="365" placeholder="Örn: 30"></div>
      </div>
      <div class="fg c2">
        <div><label>Başlangıç Tarihi</label><input type="date" id="ch-start"></div>
        <div><label>Renk</label>
          <div style="display:flex;gap:6px;margin-top:6px" id="ch-color-picker">
            <div onclick="setChColor('#237F52')" style="width:22px;height:22px;border-radius:50%;background:#237F52;cursor:pointer;border:2.5px solid var(--text)" data-col="#237F52"></div>
            <div onclick="setChColor('#3a7bd5')" style="width:22px;height:22px;border-radius:50%;background:#3a7bd5;cursor:pointer;border:2px solid transparent" data-col="#3a7bd5"></div>
            <div onclick="setChColor('#8e44ad')" style="width:22px;height:22px;border-radius:50%;background:#8e44ad;cursor:pointer;border:2px solid transparent" data-col="#8e44ad"></div>
            <div onclick="setChColor('#e53935')" style="width:22px;height:22px;border-radius:50%;background:#e53935;cursor:pointer;border:2px solid transparent" data-col="#e53935"></div>
            <div onclick="setChColor('#f59e0b')" style="width:22px;height:22px;border-radius:50%;background:#f59e0b;cursor:pointer;border:2px solid transparent" data-col="#f59e0b"></div>
            <div onclick="setChColor('#0891b2')" style="width:22px;height:22px;border-radius:50%;background:#0891b2;cursor:pointer;border:2px solid transparent" data-col="#0891b2"></div>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="cancelChForm()">İptal</button>
        <button class="btn-save" id="chf-save-btn" onclick="saveChain()">Kaydet</button>
      </div>
    </div>
    <div id="chain-list"></div>

<div style="max-width:700px;margin:0 auto">
      <div class="clock-card" style="padding:50px 40px">
        <div class="clock-label" style="font-size:13px;letter-spacing:3px;margin-bottom:20px">Kronometre</div>
        <div class="clock-time" id="sw-display" style="font-size:90px;letter-spacing:-3px">00:00:00</div>
        <div class="sw-btns" style="margin-top:36px;gap:14px">
          <button class="sw-btn-primary" id="sw-btn" onclick="swToggle()" style="padding:14px 48px;font-size:16px;border-radius:12px">Başlat</button>
          <button class="sw-btn-secondary" onclick="swReset()" style="padding:14px 28px;font-size:16px;border-radius:12px">Sıfırla</button>
        </div>
        <div class="sw-saved" id="sw-saved" style="margin-top:16px;font-size:13px"></div>
        <div id="sw-log" style="margin-top:20px;text-align:left;max-height:220px;overflow-y:auto"></div>
        <div id="sw-log-clear-wrap" style="display:none;margin-top:8px;text-align:right">
          <button onclick="swClearLog()" style="background:transparent;border:none;font-size:11px;color:var(--muted2);cursor:pointer;padding:2px 4px;text-decoration:underline">Geçmişi temizle</button>
        </div>
      </div>
    </div>
